<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Salon – Hair Transfer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d14;
      --surface: #16161f;
      --surface2: #1e1e2a;
      --border: #2a2a3a;
      --accent: #a855f7;
      --accent2: #7c3aed;
      --text: #f0eeff;
      --muted: #7c7a8e;
      --success: #22c55e;
      --error: #f87171;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1.2rem 2rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    header h1 { font-size: 1.3rem; font-weight: 700; }
    header h1 span { color: var(--accent); }
    header p { font-size: 0.78rem; color: var(--muted); margin-left: auto; }

    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1.5rem;
      padding: 2rem;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
    }

    @media (max-width: 768px) {
      main { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .card h2 {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 8px;
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.2s;
      overflow: hidden;
      position: relative;
    }

    .drop-zone:hover, .drop-zone.drag { border-color: var(--accent); }
    .drop-zone input { display: none; }

    .drop-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      padding: 1rem;
      text-align: center;
      pointer-events: none;
    }

    .drop-placeholder .icon { font-size: 2rem; }
    .drop-placeholder .hint { font-size: 0.82rem; color: var(--text); font-weight: 500; }
    .drop-placeholder .sub  { font-size: 0.72rem; color: var(--muted); }

    .drop-zone img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 6px;
    }

    .swap-btn {
      padding: 0.8rem;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .swap-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .swap-btn:not(:disabled):hover { opacity: 0.88; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .result-area {
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface2);
      border-radius: 8px;
      overflow: hidden;
    }

    .result-area img {
      width: 100%;
      border-radius: 8px;
    }

    .result-area .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .result-area .empty span { font-size: 2rem; }

    .dl-btn {
      padding: 0.5rem 1rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      align-self: flex-end;
      transition: background 0.15s;
    }

    .dl-btn:hover { background: var(--accent2); border-color: var(--accent2); }

    .error {
      color: var(--error);
      font-size: 0.8rem;
      padding: 0.5rem;
      background: rgba(248,113,113,0.08);
      border-radius: 6px;
      border: 1px solid rgba(248,113,113,0.2);
    }

    footer {
      text-align: center;
      padding: 0.75rem;
      font-size: 0.72rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>✂️ AI <span>Salon</span></h1>
  </div>
  <p id="status">Checking server…</p>
</header>

<main>
  <!-- Face -->
  <div class="card">
    <h2>Your Face</h2>
    <div class="drop-zone" id="faceZone" onclick="document.getElementById('faceInput').click()"
         ondragover="onDrag(event,this)" ondragleave="offDrag(this)" ondrop="onDrop(event,'face')">
      <input type="file" id="faceInput" accept="image/*" onchange="loadFile(this,'face')" />
      <div class="drop-placeholder" id="facePlaceholder">
        <span class="icon">👤</span>
        <span class="hint">Upload your face photo</span>
        <span class="sub">Click or drag &amp; drop</span>
      </div>
      <img id="facePreview" style="display:none" alt="face" />
    </div>
  </div>

  <!-- Reference -->
  <div class="card">
    <h2>Hairstyle Reference</h2>
    <div class="drop-zone" id="refZone" onclick="document.getElementById('refInput').click()"
         ondragover="onDrag(event,this)" ondragleave="offDrag(this)" ondrop="onDrop(event,'ref')">
      <input type="file" id="refInput" accept="image/*" onchange="loadFile(this,'ref')" />
      <div class="drop-placeholder" id="refPlaceholder">
        <span class="icon">💇</span>
        <span class="hint">Upload hairstyle reference</span>
        <span class="sub">Click or drag &amp; drop</span>
      </div>
      <img id="refPreview" style="display:none" alt="reference" />
    </div>
    <button class="swap-btn" id="swapBtn" onclick="runSwap()" disabled>
      ✨ Transfer Hairstyle
    </button>
    <div id="errorMsg" style="display:none" class="error"></div>
  </div>

  <!-- Result -->
  <div class="card">
    <h2>Result</h2>
    <div class="result-area" id="resultArea">
      <div class="empty">
        <span>🪞</span>
        <p>Result appears here</p>
      </div>
    </div>
    <button class="dl-btn" id="dlBtn" style="display:none" onclick="download()">
      ⬇ Download
    </button>
  </div>
</main>

<footer>AI Salon · Hair Transfer · HairFastGAN inspired</footer>

<script>
  let faceFile = null, refFile = null, resultB64 = null;

  // ── Health check ────────────────────────────────────────────────────────────
  fetch('/health').then(r => r.json()).then(d => {
    document.getElementById('status').textContent =
      `${d.pipeline === 'full' ? '🟢 Full pipeline' : '🟡 Quick blend mode'} · CUDA: ${d.cuda}`;
  }).catch(() => {
    document.getElementById('status').textContent = '🔴 Server offline';
  });

  // ── File handling ───────────────────────────────────────────────────────────
  function loadFile(input, type) {
    const file = input.files[0];
    if (!file) return;
    setFile(type, file);
  }

  function setFile(type, file) {
    const preview = document.getElementById(type === 'face' ? 'facePreview' : 'refPreview');
    const placeholder = document.getElementById(type === 'face' ? 'facePlaceholder' : 'refPlaceholder');
    preview.src = URL.createObjectURL(file);
    preview.style.display = 'block';
    placeholder.style.display = 'none';
    if (type === 'face') faceFile = file;
    else refFile = file;
    checkReady();
  }

  function checkReady() {
    document.getElementById('swapBtn').disabled = !(faceFile && refFile);
  }

  // ── Drag & drop ─────────────────────────────────────────────────────────────
  function onDrag(e, el) { e.preventDefault(); el.classList.add('drag'); }
  function offDrag(el)   { el.classList.remove('drag'); }
  function onDrop(e, type) {
    e.preventDefault();
    offDrag(e.currentTarget);
    const file = e.dataTransfer.files[0];
    if (file) setFile(type, file);
  }

  // ── Swap ────────────────────────────────────────────────────────────────────
  async function runSwap() {
    const btn = document.getElementById('swapBtn');
    const err = document.getElementById('errorMsg');
    err.style.display = 'none';

    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Processing…';

    document.getElementById('resultArea').innerHTML = `
      <div class="empty">
        <div class="spinner" style="width:36px;height:36px;border-width:3px"></div>
        <p style="margin-top:0.5rem;color:var(--muted);font-size:0.82rem">Running inference…</p>
      </div>`;

    try {
      const fd = new FormData();
      fd.append('face', faceFile);
      fd.append('reference', refFile);

      const res = await fetch('/swap', { method: 'POST', body: fd });
      if (!res.ok) throw new Error(await res.text());

      const data = await res.json();
      resultB64 = data.result;

      document.getElementById('resultArea').innerHTML =
        `<img src="data:image/png;base64,${resultB64}" alt="result" />`;
      document.getElementById('dlBtn').style.display = 'block';

    } catch (e) {
      err.textContent = '⚠️ ' + e.message;
      err.style.display = 'block';
      document.getElementById('resultArea').innerHTML =
        `<div class="empty"><span>⚠️</span><p>Failed</p></div>`;
    }

    btn.disabled = false;
    btn.innerHTML = '✨ Transfer Hairstyle';
  }

  // ── Download ────────────────────────────────────────────────────────────────
  function download() {
    if (!resultB64) return;
    const a = document.createElement('a');
    a.href = 'data:image/png;base64,' + resultB64;
    a.download = 'hair_transfer_result.png';
    a.click();
  }
</script>
</body>
</html>
