train:
  max_epochs: 100
  stage: "color"
  output_dir: "outputs"
  save_every: 10
  log_every: 50
  mixed_precision: true

device: "cuda"

data:
  root: "dataset"
  image_size: 256
  batch_size: 4              # CLIP model uses significant memory
  num_workers: 4
  pin_memory: true

stylegan:
  checkpoint: "pretrained/stylegan2-ffhq-256.pt"
  size: 256
  latent_dim: 512
  n_mlp: 8
  channel_multiplier: 2

encoder:
  n_styles: 14

color:
  clip_model: "ViT-B/32"

loss:
  lambda_l1: 0.5
  lambda_perceptual: 0.5
  lambda_identity: 0.1
  lambda_clip: 1.0
  lambda_adv: 0.01

optimizer:
  lr: 1.0e-4
  betas: [0.9, 0.999]
  weight_decay: 0.0
