train:
  max_epochs: 100
  stage: "encoder"
  output_dir: "outputs"
  save_every: 10
  log_every: 50
  mixed_precision: true      # RTX 4050 has Tensor Cores — big speedup

device: "cuda"

data:
  root: "dataset"
  image_size: 256
  batch_size: 8              # RTX 4050 6GB handles batch 8 at 256px
  num_workers: 4             # parallel data loading
  pin_memory: true           # faster CPU→GPU transfer

stylegan:
  checkpoint: "pretrained/stylegan2-ffhq-256.pt"
  size: 256
  latent_dim: 512
  n_mlp: 8
  channel_multiplier: 2

encoder:
  n_styles: 14

loss:
  lambda_l1: 1.0
  lambda_perceptual: 0.8
  lambda_identity: 0.0      # skip ArcFace — saves ~30% memory
  lambda_clip: 0.0
  lambda_adv: 0.0

optimizer:
  lr: 2.0e-4                 # higher LR with larger batch
  betas: [0.9, 0.999]
  weight_decay: 0.0
